<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>УютныйЧатик — многокомнатный чат</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>

<!-- Модальное окно входа -->
<div id="login-overlay" class="login-overlay">
    <div class="login-card">
        <div class="login-icon"><i class="fas fa-heart"></i></div>
        <h2>УютныйЧатик</h2>
        <p>Введите ваше имя, чтобы начать общение</p>
        <input type="text" id="login-username" placeholder="Ваше имя" maxlength="30" autocomplete="off">
        <div id="login-error" class="login-error"></div>
        <button id="login-btn"><i class="fas fa-sign-in-alt"></i> Войти</button>
    </div>
</div>

<!-- Модальное окно создания комнаты -->
<div id="create-room-overlay" class="login-overlay" style="display: none;">
    <div class="login-card">
        <div class="login-icon"><i class="fas fa-plus-circle"></i></div>
        <h2>Новая комната</h2>
        <p>Введите название комнаты</p>
        <input type="text" id="new-room-name-input" placeholder="Название комнаты" maxlength="50" autocomplete="off">
        <div id="create-room-error" class="login-error"></div>
        <button id="create-room-submit-btn"><i class="fas fa-check"></i> Создать</button>
    </div>
</div>

<!-- Основной интерфейс чата (скрыт до входа) -->
<div class="chat-app" id="chat-app" style="display: none;">
    <!-- Боковая панель -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-heart"></i> УютныйЧатик</h2>
        </div>
        <div class="rooms-list" id="rooms-list">
            <!-- Комнаты будут добавлены динамически -->
        </div>
        <div class="create-room">
            <button id="open-create-room-btn"><i class="fas fa-plus"></i> Создать комнату</button>
        </div>
        <div class="user-info">
            <label><i class="fas fa-user-circle"></i> Ваше имя</label>
            <input type="text" id="display-name" placeholder="Имя" disabled>
        </div>
        <div class="theme-toggle">
            <button id="theme-btn"><i class="fas fa-moon"></i> Тёмная тема</button>
        </div>
    </div>

    <!-- Основная область -->
    <div class="chat-main">
        <div class="chat-header">
            <h3><i class="fas fa-hashtag"></i> <span id="current-room-title">Выберите комнату</span></h3>
        </div>
        <div class="messages-container" id="messages-container">
            <div class="welcome-message">
                <i class="fas fa-comment-dots"></i> Выберите комнату слева, чтобы начать общение
            </div>
            <button id="load-more-btn" style="display:none; margin:10px auto; padding:8px 16px; border:none; border-radius:20px; background:var(--btn-bg); color:white; cursor:pointer;">
                Загрузить ещё
            </button>
        </div>
        <div class="message-input-area">
            <input type="text" id="message-input" placeholder="Введите сообщение..." disabled>
            <button id="send-btn" disabled><i class="fas fa-paper-plane"></i> Отправить</button>
        </div>
    </div>
</div>

<script src="/js/chat.js"></script>
</body>
</html>
